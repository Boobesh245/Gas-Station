<div class="container d-flex justify-content-center align-items-center vh-100">

<form (ngSubmit)="onSubmit()" class="p-4 shadow rounded bg-light" style="max-width:600px; width:100%;">

<h3 class="text-center mb-4">Registration Form</h3>

<div class="row">
<div class="col-md-6 mb-3">
<label>First Name</label>
<input type="text" class="form-control" name="firstName" [(ngModel)]="userData.firstName" placeholder="First name" required>
</div>

<div class="col-md-6 mb-3">
<label>Last Name</label>
<input type="text" class="form-control" name="lastName" [(ngModel)]="userData.lastName" placeholder="Last name" required>
</div>
</div>

<div class="row">
<div class="col-md-6 mb-3">
<label>Email</label>
<input type="email" class="form-control" name="email" [(ngModel)]="userData.email" placeholder="Email" required>
</div>

<div class="col-md-6 mb-3">
<label>Password</label>
<input type="password" class="form-control" name="password" [(ngModel)]="userData.password" placeholder="Password" required>
</div>
</div>

<div class="mb-3">
<label>Address</label>
<input type="text" class="form-control" name="address" [(ngModel)]="userData.address">
</div>

<div class="mb-3">
<label>Address 2</label>
<input type="text" class="form-control" name="address2" [(ngModel)]="userData.address2">
</div>

<div class="row">
<div class="col-md-6 mb-3">
<label>City</label>
<input type="text" class="form-control" name="city" [(ngModel)]="userData.city">
</div>

<div class="col-md-4 mb-3">
<label>State</label>
<select class="form-control" name="state" [(ngModel)]="userData.state">
<option value="">Choose...</option>
<option value="TN">Tamil Nadu</option>
<option value="KA">Karnataka</option>
<option value="KL">Kerala</option>
<option value="AP">Andhra Pradesh</option>
<option value="MH">Maharashtra</option>
</select>
</div>

<div class="col-md-2 mb-3">
<label>Zip</label>
<input type="text" class="form-control" name="zip" [(ngModel)]="userData.zip">
</div>
</div>

<div class="form-check mb-3">
<input class="form-check-input" type="checkbox" name="rememberMe" [(ngModel)]="userData.rememberMe">
<label class="form-check-label">Remember me</label>
</div>

<button type="submit" class="btn btn-primary w-100">
Get Started
</button>

</form>
</div>
